<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            cream: '#F5F0E8',
            ink: '#0D0D0D',
            moss: '#3D5A47',
            clay: '#C4714F',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { opacity: '0', transform: 'translateX(-20px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
          },
          animation: {
            'fade-up': 'fadeUp 0.6s ease forwards',
            'slide-in': 'slideIn 0.5s ease forwards',
          },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3, label { font-family: 'Syne', sans-serif; }

    .noise-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .input-field {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #0D0D0D40;
      border-radius: 0;
      padding: 10px 0;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #0D0D0D;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-field::placeholder { color: #0D0D0D55; }
    .input-field:focus { border-color: #3D5A47; }

    .btn-primary {
      background: #0D0D0D;
      color: #F5F0E8;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
      padding: 14px 40px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: #3D5A47;
      transition: left 0.4s ease;
      z-index: 0;
    }
    .btn-primary:hover::after { left: 0; }
    .btn-primary span { position: relative; z-index: 1; }

    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.35s; opacity: 0; }
    .delay-4 { animation-delay: 0.5s; opacity: 0; }
    .delay-5 { animation-delay: 0.65s; opacity: 0; }
    .delay-6 { animation-delay: 0.8s; opacity: 0; }

    .deco-line {
      width: 40px;
      height: 2px;
      background: #C4714F;
      display: inline-block;
      vertical-align: middle;
      margin-right: 12px;
    }
  </style>
</head>
<body class="noise-bg bg-cream min-h-screen flex items-center justify-center px-4">

  <!-- Background decoration -->
  <div class="fixed top-0 right-0 w-1/2 h-full bg-moss opacity-5 -z-0 pointer-events-none"
       style="clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%)"></div>
  <div class="fixed bottom-12 left-12 w-24 h-24 border border-clay opacity-20 rounded-full pointer-events-none -z-0"></div>
  <div class="fixed top-16 left-8 w-3 h-3 bg-clay opacity-40 rounded-full pointer-events-none -z-0"></div>

  <div class="relative z-10 w-full max-w-md">

    <!-- Tag -->
    <div class="animate-slide-in delay-1 mb-8">
      <span class="deco-line"></span>
      <span class="text-xs font-display font-600 tracking-widest text-ink uppercase opacity-50">Bienvenido de vuelta</span>
    </div>

    <!-- Heading -->
    <h1 class="animate-fade-up delay-2 font-display text-5xl font-800 text-ink leading-tight mb-2">
      Iniciar<br>sesión
    </h1>
    <p class="animate-fade-up delay-3 font-body text-sm text-ink opacity-40 mb-12">
      Accede a tu cuenta para continuar.
    </p>

    <!-- Form -->
    <form action="/login" method="POST" class="space-y-10">

      <!-- Email -->
      <div class="animate-fade-up delay-3">
        <label class="block text-xs font-display font-600 tracking-widest text-ink uppercase opacity-60 mb-3">
          Correo electrónico
        </label>
        <input
          type="email"
          name="email"
          placeholder="tu@correo.com"
          required
          class="input-field"
        />
      </div>

      <!-- Password -->
      <div class="animate-fade-up delay-4">
        <label class="block text-xs font-display font-600 tracking-widest text-ink uppercase opacity-60 mb-3">
          Contraseña
        </label>
        <input
          type="password"
          name="password"
          placeholder="••••••••"
          required
          class="input-field"
        />
        <div class="text-right mt-2">
          <a href="#" class="text-xs font-body text-moss opacity-70 hover:opacity-100 transition-opacity underline underline-offset-2">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>

      <!-- Submit -->
      <div class="animate-fade-up delay-5 pt-2">
        <button type="submit" class="btn-primary w-full">
          <span>Entrar</span>
        </button>
      </div>

    </form>

    <!-- Register link -->
    <div class="animate-fade-up delay-6 mt-10 flex items-center gap-3">
      <div class="flex-1 h-px bg-ink opacity-10"></div>
      <p class="font-body text-xs text-ink opacity-50 whitespace-nowrap">¿No tienes cuenta?</p>
      <div class="flex-1 h-px bg-ink opacity-10"></div>
    </div>
    <div class="animate-fade-up delay-6 mt-4 text-center">
      <a href="/register.html"
         class="font-display text-sm font-600 tracking-wide text-moss border-b border-moss border-opacity-40 pb-0.5 hover:border-opacity-100 transition-all">
        Crear cuenta
      </a>
    </div>

  </div>
</body>
</html>
