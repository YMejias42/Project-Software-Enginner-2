<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            cream: '#F5F0E8',
            ink: '#0D0D0D',
            moss: '#3D5A47',
            clay: '#C4714F',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { opacity: '0', transform: 'translateX(-20px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
          },
          animation: {
            'fade-up': 'fadeUp 0.6s ease forwards',
            'slide-in': 'slideIn 0.5s ease forwards',
          },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3, label { font-family: 'Syne', sans-serif; }

    .noise-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .input-field {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #0D0D0D40;
      border-radius: 0;
      padding: 10px 0;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #0D0D0D;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-field::placeholder { color: #0D0D0D55; }
    .input-field:focus { border-color: #3D5A47; }

    .btn-primary {
      background: #0D0D0D;
      color: #F5F0E8;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
      padding: 14px 40px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
      width: 100%;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: #3D5A47;
      transition: left 0.4s ease;
      z-index: 0;
    }
    .btn-primary:hover::after { left: 0; }
    .btn-primary span { position: relative; z-index: 1; }

    /* Step indicator */
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #0D0D0D18;
      transition: background 0.3s, transform 0.3s;
    }
    .step-dot.active {
      background: #C4714F;
      transform: scale(1.3);
    }

    /* Password strength bar */
    .strength-bar {
      height: 2px;
      background: #0D0D0D10;
      position: relative;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.4s ease, background 0.4s ease;
    }

    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.35s; opacity: 0; }
    .delay-4 { animation-delay: 0.5s; opacity: 0; }
    .delay-5 { animation-delay: 0.62s; opacity: 0; }
    .delay-6 { animation-delay: 0.74s; opacity: 0; }
    .delay-7 { animation-delay: 0.86s; opacity: 0; }

    .deco-line {
      width: 40px;
      height: 2px;
      background: #C4714F;
      display: inline-block;
      vertical-align: middle;
      margin-right: 12px;
    }

    /* Floating label effect */
    .field-group { position: relative; }
    .field-icon {
      position: absolute;
      right: 0;
      bottom: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      color: #3D5A47;
      font-size: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .input-field:valid:not(:placeholder-shown) + .field-icon { opacity: 1; }
  </style>
</head>
<body class="noise-bg bg-cream min-h-screen flex items-center justify-center px-4 py-12">

  <!-- Background decorations — mirrored from login for visual consistency -->
  <div class="fixed top-0 left-0 w-1/2 h-full bg-moss opacity-5 -z-0 pointer-events-none"
       style="clip-path: polygon(0% 0%, 80% 0%, 100% 100%, 0% 100%)"></div>
  <div class="fixed top-12 right-12 w-24 h-24 border border-clay opacity-20 rounded-full pointer-events-none -z-0"></div>
  <div class="fixed bottom-16 right-8 w-3 h-3 bg-clay opacity-40 rounded-full pointer-events-none -z-0"></div>
  <!-- Extra decorative element unique to register -->
  <div class="fixed top-1/2 right-16 -translate-y-1/2 w-px h-32 bg-moss opacity-10 pointer-events-none -z-0"></div>

  <div class="relative z-10 w-full max-w-md">

    <!-- Tag -->
    <div class="animate-slide-in delay-1 mb-8">
      <span class="deco-line"></span>
      <span class="text-xs font-display font-semibold tracking-widest text-ink uppercase opacity-50">Crea tu cuenta</span>
    </div>

    <!-- Heading -->
    <h1 class="animate-fade-up delay-2 font-display text-5xl font-extrabold text-ink leading-tight mb-2">
      Registro<br>de usuario
    </h1>
    <p class="animate-fade-up delay-3 font-body text-sm text-ink opacity-40 mb-10">
      Completa los datos para comenzar.
    </p>

    <!-- Progress dots -->
    <div class="animate-fade-up delay-3 flex gap-2 mb-10">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <!-- Form -->
    <form action="/register_user" method="POST" class="space-y-9">

      <!-- Name -->
      <div class="animate-fade-up delay-3">
        <label class="block text-xs font-display font-semibold tracking-widest text-ink uppercase opacity-60 mb-3">
          Nombre completo
        </label>
        <div class="field-group">
          <input
            type="text"
            name="name"
            placeholder="Tu nombre"
            required
            class="input-field"
            id="inputName"
          />
          <span class="field-icon">✓</span>
        </div>
      </div>

      <!-- Email -->
      <div class="animate-fade-up delay-4">
        <label class="block text-xs font-display font-semibold tracking-widest text-ink uppercase opacity-60 mb-3">
          Correo electrónico
        </label>
        <div class="field-group">
          <input
            type="email"
            name="email"
            placeholder="tu@correo.com"
            required
            class="input-field"
            id="inputEmail"
          />
          <span class="field-icon">✓</span>
        </div>
      </div>

      <!-- Password -->
      <div class="animate-fade-up delay-5">
        <label class="block text-xs font-display font-semibold tracking-widest text-ink uppercase opacity-60 mb-3">
          Contraseña
        </label>
        <div class="field-group">
          <input
            type="password"
            name="password"
            placeholder="Mínimo 8 caracteres"
            required
            class="input-field"
            id="inputPassword"
            minlength="8"
          />
          <span class="field-icon">✓</span>
        </div>
        <!-- Strength bar -->
        <div class="strength-bar mt-3">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <p class="text-xs font-body opacity-40 mt-1.5" id="strengthLabel"></p>
      </div>

      <!-- Terms -->
      <div class="animate-fade-up delay-6 flex items-start gap-3 pt-1">
        <input type="checkbox" id="terms" required
          class="mt-0.5 w-4 h-4 accent-moss cursor-pointer flex-shrink-0"/>
        <label for="terms" class="text-xs font-body text-ink opacity-50 leading-relaxed cursor-pointer">
          Acepto los <a href="#" class="underline underline-offset-2 hover:opacity-100 transition-opacity text-moss">términos y condiciones</a> y la <a href="#" class="underline underline-offset-2 hover:opacity-100 transition-opacity text-moss">política de privacidad</a>.
        </label>
      </div>

      <!-- Submit -->
      <div class="animate-fade-up delay-7 pt-1">
        <button type="submit" class="btn-primary">
          <span>Crear cuenta</span>
        </button>
      </div>

    </form>

    <!-- Back to login -->
    <div class="animate-fade-up delay-7 mt-10 flex items-center gap-3">
      <div class="flex-1 h-px bg-ink opacity-10"></div>
      <p class="font-body text-xs text-ink opacity-50 whitespace-nowrap">¿Ya tienes cuenta?</p>
      <div class="flex-1 h-px bg-ink opacity-10"></div>
    </div>
    <div class="animate-fade-up delay-7 mt-4 text-center">
      <a href="login.html"
         class="font-display text-sm font-semibold tracking-wide text-moss border-b border-moss border-opacity-40 pb-0.5 hover:border-opacity-100 transition-all">
        Volver al login
      </a>
    </div>

  </div>

  <script>
    // Password strength indicator
    const pwd = document.getElementById('inputPassword');
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const dots = [
      document.getElementById('dot1'),
      document.getElementById('dot2'),
      document.getElementById('dot3'),
    ];

    pwd.addEventListener('input', () => {
      const v = pwd.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
      if (/[0-9]/.test(v) || /[^A-Za-z0-9]/.test(v)) score++;

      const levels = [
        { w: '30%', bg: '#C4714F', text: 'Débil' },
        { w: '65%', bg: '#B8A84A', text: 'Moderada' },
        { w: '100%', bg: '#3D5A47', text: 'Fuerte' },
      ];
      if (v.length === 0) {
        fill.style.width = '0%';
        label.textContent = '';
        dots.forEach((d,i) => d.classList.toggle('active', i === 0));
        return;
      }
      const lvl = levels[score - 1] || levels[0];
      fill.style.width = lvl.w;
      fill.style.background = lvl.bg;
      label.textContent = `Seguridad: ${lvl.text}`;
      label.style.color = lvl.bg;

      // Advance dots
      dots.forEach((d,i) => d.classList.toggle('active', i < score));
    });
  </script>
</body>
</html>
