{% extends "base.html" %}
{% block title %}Añadir libro{% endblock %}
{% block content %}

<h1 class="font-display text-3xl font-bold mb-6">Añadir libro</h1>

<form method="POST" class="space-y-4 max-w-md">

  <div>
    <label class="block text-sm font-semibold mb-1">Título</label>
    <input type="text" name="title" required
           class="w-full border px-3 py-2 rounded">
  </div>

  <div>
    <label class="block text-sm font-semibold mb-1">Autor</label>
    <input type="text" name="author" required
           class="w-full border px-3 py-2 rounded">
  </div>

  <div>
    <label class="block text-sm font-semibold mb-1">Color de portada</label>
    <input type="text" name="cover_color" required
           class="w-full border px-3 py-2 rounded">
  </div>

  <button type="submit"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
    Guardar
  </button>

</form>

{% endblock %}
