<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Biblioteca</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family:'Times New Roman', serif; }
    h1,label { font-family:'Times New Roman', serif; }

    .noise::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    }

    .input-field {
      background:transparent; border:none; border-bottom:1.5px solid #1e3a8a40;
      padding:10px 0; width:100%; font-size:.95rem;
      color:#0f172a; outline:none; transition:border-color .3s;
    }
    .input-field::placeholder { color:#1e3a8a55; }
    .input-field:focus { border-color:#2563eb; }

    .btn-primary {
      background:#1e3a8a;
      color:#ffffff;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:.8rem;
      padding:14px 40px;
      border:none;
      cursor:pointer;
      position:relative;
      overflow:hidden;
      width:100%;
    }
    .btn-primary::after {
      content:''; position:absolute; left:-100%; top:0;
      width:100%; height:100%;
      background:#2563eb;
      transition:left .4s ease;
      z-index:0;
    }
    .btn-primary:hover::after { left:0; }
    .btn-primary span { position:relative; z-index:1; }

    .deco-line {
      width:40px; height:2px;
      background:#2563eb;
      display:inline-block;
      vertical-align:middle;
      margin-right:12px;
    }

    @keyframes fadeUp {
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    .au { animation:fadeUp .6s ease forwards; }
    .d1{animation-delay:.1s;opacity:0}
    .d2{animation-delay:.2s;opacity:0}
    .d3{animation-delay:.35s;opacity:0}
    .d4{animation-delay:.5s;opacity:0}
    .d5{animation-delay:.65s;opacity:0}
    .d6{animation-delay:.8s;opacity:0}
  </style>
</head>

<body class="noise bg-[#f1f5f9] min-h-screen flex items-center justify-center px-4">

  <div class="fixed top-0 right-0 w-1/2 h-full bg-[#1e3a8a] opacity-5 -z-0 pointer-events-none"
       style="clip-path:polygon(20% 0%,100% 0%,100% 100%,0% 100%)"></div>

  <div class="fixed bottom-12 left-12 w-24 h-24 border border-[#2563eb] opacity-20 rounded-full pointer-events-none -z-0"></div>
  <div class="fixed top-16 left-8 w-3 h-3 bg-[#2563eb] opacity-40 rounded-full pointer-events-none -z-0"></div>

  <div class="relative z-10 w-full max-w-md">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
        <div class="mb-6 bg-[#1e3a8a] text-white text-sm px-5 py-3 flex justify-between">
          <span>{{ msg }}</span>
          <button onclick="this.parentElement.remove()" class="opacity-50 hover:opacity-100 ml-4">×</button>
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="au d1 mb-8">
      <span class="deco-line"></span>
      <span class="text-xs font-semibold tracking-widest text-[#1e293b] uppercase opacity-50">
        Sistema de Biblioteca
      </span>
    </div>

    <h1 class="au d2 text-5xl font-extrabold text-[#0f172a] leading-tight mb-2">
      Iniciar<br>sesión
    </h1>

    <p class="au d3 text-sm text-[#1e293b] opacity-40 mb-12">
      Accede a tu cuenta para continuar.
    </p>

    <form action="/login" method="POST" class="space-y-10">
      <div class="au d3">
        <label class="block text-xs font-semibold tracking-widest text-[#1e293b] uppercase opacity-60 mb-3">
          Correo electrónico
        </label>
        <input type="email" name="email" placeholder="tu@correo.com" required class="input-field"/>
      </div>

      <div class="au d4">
        <label class="block text-xs font-semibold tracking-widest text-[#1e293b] uppercase opacity-60 mb-3">
          Contraseña
        </label>
        <input type="password" name="password" placeholder="••••••••" required class="input-field"/>
      </div>

      <div class="au d5 pt-2">
        <button type="submit" class="btn-primary"><span>Entrar</span></button>
      </div>
    </form>

    <div class="au d6 mt-10 flex items-center gap-3">
      <div class="flex-1 h-px bg-[#1e293b] opacity-10"></div>
      <p class="text-xs text-[#1e293b] opacity-50 whitespace-nowrap">¿No tienes cuenta?</p>
      <div class="flex-1 h-px bg-[#1e293b] opacity-10"></div>
    </div>

    <div class="au d6 mt-4 text-center">
      <a href="/register"
         class="text-sm font-semibold tracking-wide text-[#1e3a8a] border-b border-[#1e3a8a] border-opacity-40 pb-0.5 hover:border-opacity-100 transition-all">
        Crear cuenta
      </a>
    </div>

  </div>
</body>
</html>
