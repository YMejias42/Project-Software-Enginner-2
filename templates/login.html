<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Biblioteca</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family:'DM Sans',sans-serif; }
    h1,label { font-family:'Syne',sans-serif; }
    .noise::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    }
    .input-field {
      background:transparent; border:none; border-bottom:1.5px solid #0D0D0D40; border-radius:0;
      padding:10px 0; width:100%; font-family:'DM Sans',sans-serif; font-size:.95rem;
      color:#0D0D0D; outline:none; transition:border-color .3s;
    }
    .input-field::placeholder { color:#0D0D0D55; }
    .input-field:focus { border-color:#3D5A47; }
    .btn-primary {
      background:#0D0D0D; color:#F5F0E8; font-family:'Syne',sans-serif; font-weight:600;
      letter-spacing:.08em; text-transform:uppercase; font-size:.8rem; padding:14px 40px;
      border:none; cursor:pointer; position:relative; overflow:hidden; width:100%;
    }
    .btn-primary::after {
      content:''; position:absolute; left:-100%; top:0; width:100%; height:100%;
      background:#3D5A47; transition:left .4s ease; z-index:0;
    }
    .btn-primary:hover::after { left:0; }
    .btn-primary span { position:relative; z-index:1; }
    .deco-line { width:40px; height:2px; background:#C4714F; display:inline-block; vertical-align:middle; margin-right:12px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .au { animation:fadeUp .6s ease forwards; }
    .d1{animation-delay:.1s;opacity:0} .d2{animation-delay:.2s;opacity:0}
    .d3{animation-delay:.35s;opacity:0} .d4{animation-delay:.5s;opacity:0}
    .d5{animation-delay:.65s;opacity:0} .d6{animation-delay:.8s;opacity:0}
  </style>
</head>
<body class="noise bg-[#F5F0E8] min-h-screen flex items-center justify-center px-4">

  <div class="fixed top-0 right-0 w-1/2 h-full bg-[#3D5A47] opacity-5 -z-0 pointer-events-none"
       style="clip-path:polygon(20% 0%,100% 0%,100% 100%,0% 100%)"></div>
  <div class="fixed bottom-12 left-12 w-24 h-24 border border-[#C4714F] opacity-20 rounded-full pointer-events-none -z-0"></div>
  <div class="fixed top-16 left-8 w-3 h-3 bg-[#C4714F] opacity-40 rounded-full pointer-events-none -z-0"></div>

  <div class="relative z-10 w-full max-w-md">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
        <div class="mb-6 bg-[#0D0D0D] text-[#F5F0E8] text-sm px-5 py-3 flex justify-between">
          <span>{{ msg }}</span>
          <button onclick="this.parentElement.remove()" class="opacity-50 hover:opacity-100 ml-4">×</button>
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="au d1 mb-8">
      <span class="deco-line"></span>
      <span class="text-xs font-[Syne] font-semibold tracking-widest text-[#0D0D0D] uppercase opacity-50">Sistema de Biblioteca</span>
    </div>

    <h1 class="au d2 font-[Syne] text-5xl font-extrabold text-[#0D0D0D] leading-tight mb-2">Iniciar<br>sesión</h1>
    <p class="au d3 text-sm text-[#0D0D0D] opacity-40 mb-12">Accede a tu cuenta para continuar.</p>

    <form action="/login" method="POST" class="space-y-10">
      <div class="au d3">
        <label class="block text-xs font-[Syne] font-semibold tracking-widest text-[#0D0D0D] uppercase opacity-60 mb-3">Correo electrónico</label>
        <input type="email" name="email" placeholder="tu@correo.com" required class="input-field"/>
      </div>
      <div class="au d4">
        <label class="block text-xs font-[Syne] font-semibold tracking-widest text-[#0D0D0D] uppercase opacity-60 mb-3">Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required class="input-field"/>
      </div>
      <div class="au d5 pt-2">
        <button type="submit" class="btn-primary"><span>Entrar</span></button>
      </div>
    </form>

    <div class="au d6 mt-10 flex items-center gap-3">
      <div class="flex-1 h-px bg-[#0D0D0D] opacity-10"></div>
      <p class="text-xs text-[#0D0D0D] opacity-50 whitespace-nowrap">¿No tienes cuenta?</p>
      <div class="flex-1 h-px bg-[#0D0D0D] opacity-10"></div>
    </div>
    <div class="au d6 mt-4 text-center">
      <a href="/register" class="font-[Syne] text-sm font-semibold tracking-wide text-[#3D5A47] border-b border-[#3D5A47] border-opacity-40 pb-0.5 hover:border-opacity-100 transition-all">
        Crear cuenta
      </a>
    </div>
  </div>
</body>
</html>
